name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            label: Windows x64
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macOS Apple Silicon
          - platform: ubuntu-22.04
            args: ''
            label: Linux x64
          - platform: ubuntu-22.04-arm
            args: ''
            label: Linux arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src-ui/package-lock.json

      - name: Install & build frontend
        run: |
          cd src-ui
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'aarch64-apple-darwin') && 'aarch64-apple-darwin' || '' }}


      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      # ── Windows / Linux: tauri-action handles build + DMG/installer + upload ──
      - name: Build & publish (Windows / Linux)
        if: matrix.platform != 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Coffee CLI v__VERSION__'
          releaseBody: |
            ## Install

            **Windows**
            ```powershell
            irm https://raw.githubusercontent.com/edison7009/Coffee-CLI/main/install/install.ps1 | iex
            ```

            **macOS / Linux**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/edison7009/Coffee-CLI/main/install/install.sh | sh
            ```

            Or download the installer for your platform from the assets below.

            | Platform | File |
            |---|---|
            | Windows x64 | `Coffee.CLI_*_x64-setup.exe` |
            | macOS Apple Silicon | `Coffee.CLI_*_aarch64.dmg` |
            | macOS Intel | `Coffee.CLI_*_x64.dmg` |
            | Linux x64 (Debian/Ubuntu) | `coffee-cli_*_amd64.deb` |
            | Linux x64 (AppImage) | `Coffee.CLI_*_amd64.AppImage` |
            | Linux arm64 (Debian/Ubuntu) | `coffee-cli_*_arm64.deb` |
            | Linux arm64 (AppImage) | `Coffee.CLI_*_aarch64.AppImage` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload SHA-256 checksums (Windows / Linux)
        if: matrix.platform != 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" = "$GITHUB_REF" ]; then
            TAG=$(git describe --tags --abbrev=0)
          fi

          mapfile -d '' FILES < <(find target -type f \( \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.AppImage" \
          \) -print0)

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::error::No release artifacts found to checksum"
            find target -type f 2>/dev/null | head -200
            exit 1
          fi

          for file in "${FILES[@]}"; do
            base=$(basename "$file")
            digest=$(shasum -a 256 "$file" | awk '{print $1}')
            printf '%s  %s\n' "$digest" "$base" > "$file.sha256"
            gh release upload "$TAG" "$file.sha256" --repo "${{ github.repository }}" --clobber
          done

      # ── macOS: split into build → Developer ID sign → DMG → upload ──
      # Release builds must use a real Apple Developer ID certificate.
      # Ad-hoc signatures are intentionally rejected because installers
      # and users cannot authenticate the publisher from them.
      - name: Install Tauri CLI (macOS)
        if: matrix.platform == 'macos-latest'
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Import Apple signing certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "::error::APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, and APPLE_SIGNING_IDENTITY secrets are required for macOS releases"
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build .app only (macOS)
        if: matrix.platform == 'macos-latest'
        run: cargo tauri build --bundles app ${{ matrix.args }}

      - name: Sign with Developer ID (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP=$(find target/aarch64-apple-darwin/release/bundle/macos -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app found"
            find target -name "*.app" 2>/dev/null
            exit 1
          fi
          echo "Signing: $APP"
          codesign --force --deep --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$APP"
          codesign -dv --verbose=4 "$APP" 2>&1
          codesign --verify --deep --strict "$APP"
          if codesign -dv --verbose=4 "$APP" 2>&1 | grep -q "Signature=adhoc"; then
            echo "::error::Release app is still ad-hoc signed"
            exit 1
          fi
          if ! codesign -dv --verbose=4 "$APP" 2>&1 | grep -q "Authority=Developer ID Application"; then
            echo "::error::Release app is not signed with a Developer ID Application certificate"
            exit 1
          fi

      - name: Build DMG from re-signed .app (macOS)
        if: matrix.platform == 'macos-latest'
        run: cargo tauri bundle --bundles dmg ${{ matrix.args }}

      - name: Upload DMG to release (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # If triggered by workflow_dispatch (no tag), use latest tag.
          if [ "$TAG" = "$GITHUB_REF" ]; then
            TAG=$(git describe --tags --abbrev=0)
          fi
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No .dmg produced"
            find target -name "*.dmg" 2>/dev/null
            exit 1
          fi
          echo "Uploading $DMG to release $TAG"
          # Wait for the release to exist (Windows/Linux jobs in matrix
          # may still be creating it). --clobber replaces if asset exists.
          for i in 1 2 3 4 5 6; do
            if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              break
            fi
            echo "Release $TAG not yet available, waiting 10s... (attempt $i/6)"
            sleep 10
          done
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            # Release still doesn't exist — create it ourselves so we don't
            # block on a parallel matrix job that may have failed.
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "Coffee CLI $TAG" \
              --notes "macOS-only release placeholder — see other assets if Windows/Linux jobs succeed."
          fi
          digest=$(shasum -a 256 "$DMG" | awk '{print $1}')
          printf '%s  %s\n' "$digest" "$(basename "$DMG")" > "$DMG.sha256"
          gh release upload "$TAG" "$DMG" "$DMG.sha256" --repo "${{ github.repository }}" --clobber
